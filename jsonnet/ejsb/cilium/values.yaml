# values.yaml
k8sServiceHost: 192.168.50.190
k8sServicePort: 6443

ipv4:
  enabled: true
ipv6:
  enabled: true

ipam:
  mode: cluster-pool
  operator:
    clusterPoolIPv4PodCIDRList: "10.42.0.0/16"
    clusterPoolIPv6PodCIDRList: "2001:cafe:42::/56"
    clusterPoolIPv4MaskSize: 24
    clusterPoolIPv6MaskSize: 64

enableIPv6Masquerade: true
kubeProxyReplacement: true

gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: true

envoy:
  enabled: true
  securityContext:
    capabilities:
      keepCapNetBindService: true
      envoy:
        - NET_ADMIN
        - PERFMON
        - BPF
        - NET_BIND_SERVICE

bpf:
  masquerade: true

l2announcements:
  enabled: true

externalIPs:
  enabled: true

k8sClientRateLimit:
  qps: 50
  burst: 200

operator:
  replicas: 1
  rollOutPods: true

rollOutCiliumPods: true

hubble:
  enabled: true
  relay:
    enabled: true
    rollOutPods: true
  ui:
    enabled: true
    rollOutPods: true

ingressController:
  enabled: true
  default: true
  loadbalancerMode: shared
  service:
    annotations:
      io.cilium/lb-ipam-ips: 192.168.50.224

extraConfig:
  enable-ipv6-ndp: "true"
  ipv6-mcast-device: "bond0"
  ipv6-service-range: "2001:cafe:43::/112"
