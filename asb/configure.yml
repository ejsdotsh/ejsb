---
# playbook to configure (newly) provisioned systems

- name: Configure nas
  ansible.builtin.import_playbook: machines/nas/main.yml
  tags:
    - "configure::nas"
    - "configure::all"
    - "never"

- name: Configure www
  ansible.builtin.import_playbook: machines/www/main.yml
  tags:
    - "configure::www"
    - "configure::all"
    - "never"

